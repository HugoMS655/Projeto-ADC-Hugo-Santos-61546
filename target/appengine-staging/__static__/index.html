<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Acesso ao Sistema</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-box">
    <div class="card">
        <h3>Criar Conta</h3>
        <input type="text" id="regUser" placeholder="Username">
        <input type="password" id="regPwd" placeholder="Password">
        <input type="password" id="regConf" placeholder="Confirmar Password">
        <button onclick="authAction('createaccount')">Registar</button>
        <p id="regMsg"></p>
    </div>

    <div class="card">
        <h3>Login</h3>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPwd" placeholder="Password">
        <button onclick="authAction('login')">Entrar</button>
        <p id="loginMsg"></p>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
