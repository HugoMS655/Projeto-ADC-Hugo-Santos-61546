<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADC - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Bem-vindo</h1>
        <p>Faça login para aceder ao dashboard</p>

        <div class="form-group">
            <label for="loginUser">Utilizador</label>
            <input type="text" id="loginUser" placeholder="ex: admin@email.com">

            <label for="loginPwd">Palavra-passe</label>
            <input type="password" id="loginPwd" placeholder="••••••••">

            <button id="loginBtn" onclick="doLogin()">Entrar</button>
        </div>
        <p id="loginMsg" class="msg"></p>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
