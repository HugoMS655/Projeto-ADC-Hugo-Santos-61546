<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>ADC - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">ADC Application</div>
    <div class="nav-user">
        <span id="welcomeText"></span>
        <span id="userRole" class="badge"></span>
        <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
</nav>

<main class="container">
    <section class="card">
        <div class="card-header">
            <h3>Utilizadores do Sistema</h3>
            <button onclick="loadUsers()" class="btn-sm">Atualizar</button>
        </div>

        <div class="table-responsive">
            <table id="userTable">
                <thead>
                <tr>
                    <th>Username</th>
                    <th>Cargo</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="js/app.js"></script>
<script>window.onload = initDashboard;</script>
</body>
</html>
